<!DOCTYPE html>
<html>
<head>
  <title>Aroma Printer</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f5f5f7;
    }
    .container {
      padding: 20px;
      border-radius: 12px;
      background: white;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h2 {
      margin-top: 0;
      color: #1d1d1f;
    }
    .status {
      font-size: 18px;
      color: #34c759;
      font-weight: 600;
    }
    p {
      color: #86868b;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🖨 Aroma Printer</h2>
    <p class="status">Printer Connected ✅</p>
    <p>Keep this app running to enable silent printing from your dashboard.</p>
  </div>
</body>
</html>
