# electron-builder.yml — ByteBusiness POS packaging configuration

appId: com.bytebusiness.pos
productName: ByteBusiness POS
copyright: Copyright © 2025 ByteBusiness

directories:
  buildResources: electron/assets
  output: release/${version}

# ── asar + asarUnpack ────────────────────────────────────────────────────────
# asar: true  (default) — packs everything into a single archive.
#   Solves EMFILE: macOS signs one .asar file instead of 10,000+ individual
#   node_modules files, which was hitting the open-file-descriptor limit.
#
# asarUnpack — extracts only the two paths that MUST be at real filesystem
#   locations (asar virtual paths cannot be used with child_process.spawn or
#   for loading .node native addons):
#
#   1. .next/standalone/**  — the Next.js server we spawn via ELECTRON_RUN_AS_NODE
#   2. node_modules/better-sqlite3/**  — native .node addon needs a real path
#
# Unpacked files land in  app.asar.unpacked/  next to  app.asar.
# next-server.ts uses  path.dirname(app.getAppPath()) + '/app.asar.unpacked'
# to resolve the real standalone path at runtime.
asarUnpack:
  - ".next/standalone/**/*"
  - "node_modules/better-sqlite3/**/*"

# ── Files bundled into the asar archive ──────────────────────────────────────
files:
  - dist-electron/**/*
  - .next/standalone/**/*
  - package.json
  - "!node_modules/.cache/**/*"
  - "!.next/cache/**/*"
  - "!electron/**/*"
  - "!src/**/*"

# ── Extra files placed directly in Contents/Resources/ ───────────────────────
extraResources:
  # .env.local → .env — API keys for Firebase Admin, Resend, Upstash.
  # Loaded by next-server.ts at spawn time via process.resourcesPath + '/.env'
  - from: .env.local
    to: .env
  # ESC/POS receipt formatter used by printer-engine.ts
  - from: byte_printer/receipt.js
    to: byte_printer/receipt.js
  # Windows PowerShell raw-print helper
  - from: byte_printer/scripts/raw-print.ps1
    to: printer-scripts/raw-print.ps1

npmRebuild: true
nodeGypRebuild: false

# ── macOS — arm64 only ────────────────────────────────────────────────────────
mac:
  category: public.app-category.business
  icon: electron/assets/icon.icns
  target:
    - target: dmg
      arch:
        - arm64

dmg:
  title: ByteBusiness POS ${version}
  icon: electron/assets/icon.icns
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  background: null

# ── Windows ───────────────────────────────────────────────────────────────────
win:
  icon: electron/assets/icon.ico
  target:
    # x64  → modern 64-bit Windows 10/11 (most vendor machines)
    # ia32 → older 32-bit Windows machines (broad compatibility)
    # arm64→ Windows on ARM (Surface Pro X, Snapdragon laptops)
    - target: nsis
      arch:
        - x64
        - ia32
        - arm64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: ByteBusiness POS
  # Each arch gets its own separate installer file — vendor picks the right one
  differentialPackage: false
