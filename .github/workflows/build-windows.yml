name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Create .env.local
        shell: bash
        run: echo "${{ secrets.ENV_LOCAL_BASE64 }}" | base64 -d > .env.local

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build Next.js
        run: npm run build

      - name: Prepare standalone
        run: npm run electron:prepare

      # Remove hash-named symlinks Next.js creates inside standalone/.next/node_modules/
      # These are broken junctions on Windows and cause 7-zip to exit with code 1.
      # They are NOT needed at runtime — standalone server uses standalone/node_modules/.
      - name: Remove broken symlinks
        shell: bash
        run: rm -rf .next/standalone/.next/node_modules

      - name: Compile Electron TypeScript
        run: npm run electron:compile

      - name: Package with electron-builder
        run: npx electron-builder --win --x64 --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ByteBusiness-POS-Windows
          path: release/**/*.exe
          retention-days: 14
