name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Create .env.local
      - name: Create .env.local
        shell: bash
        run: |
          echo "${{ secrets.ENV_LOCAL_BASE64 }}" | base64 -d > .env.local

      # 4. Install dependencies
      - name: Install dependencies
        run: npm ci --ignore-scripts

      # 5. Rebuild better-sqlite3 only for x64 + arm64
      - name: Rebuild native modules
        run: |
          npx electron-rebuild -f -w better-sqlite3 --arch=x64
          npx electron-rebuild -f -w better-sqlite3 --arch=arm64

      # 6. Build Electron app
      - name: Build Windows app
        run: npx electron-builder --win nsis --x64 --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 7. Upload installers
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ByteBusiness-POS-Windows
          path: release/**/*.exe
          retention-days: 14